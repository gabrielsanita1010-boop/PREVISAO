<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Previsão de Vendas</title>
<style>
  :root {
    --bg:#0c0f14; --surface:#131820; --card:#1a2030; --border:#222c3c;
    --accent:#00e5a0; --accent2:#00aaff; --warn:#ff9800;
    --text:#e8edf5; --muted:#5a6a82; --danger:#ff4d6d;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:sans-serif;font-size:14px;min-height:100vh}

  /* LOADING */
  #loading{position:fixed;inset:0;background:rgba(12,15,20,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{color:var(--muted);font-size:13px}

  /* TOAST */
  .toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--radius);padding:12px 20px;font-size:13px;z-index:9998;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{border-left-color:var(--danger)}

  /* MODAL CONEXÃO */
  .modal-overlay{position:fixed;inset:0;background:rgba(12,15,20,.78);display:flex;align-items:center;justify-content:center;z-index:200}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px 32px;width:460px;max-width:95vw}
  .modal h2{font-size:20px;font-weight:800;margin-bottom:6px}
  .modal-desc{color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.5}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
  .form-group input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;outline:none}
  .form-group input:focus{border-color:var(--accent2)}
  .hint-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6}
  .hint-box strong{color:var(--accent2)}
  .btn-primary{width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:11px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s}
  .btn-primary:hover{opacity:.85}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}

  /* LAYOUT PRINCIPAL — placeholder para o layout definitivo */
  #app{display:none;padding:30px 24px;max-width:1200px;margin:0 auto}
  #app h1{font-size:22px;font-weight:800;color:var(--accent);margin-bottom:8px}
  #app .info{color:var(--muted);font-size:13px;margin-bottom:24px}
  .dados-json{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:12px;color:var(--accent2);white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto}
  .btn-settings{margin-top:16px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:7px 14px;cursor:pointer;font-size:13px}
  .btn-settings:hover{border-color:var(--accent2);color:var(--text)}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loadingMsg">Carregando...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>



<!-- APP PRINCIPAL (layout definitivo vai aqui) -->
<div id="app">
  <h1>✅ Conexão OK — PREVFISH</h1>
  <p class="info">Dados carregados com sucesso. O layout será construído aqui.</p>
  <div class="dados-json" id="dadosJson"></div>
</div>

<script>
// ────────────────────────────────────────────────
// ESTADO GLOBAL
// ────────────────────────────────────────────────
const API_URL       = "https://script.google.com/macros/s/AKfycbwcDbFRKkH65i10MnVrOpxWuyb1qm_GajWEZR-HcGJiQFtOkqgpClqLZPEF6hto2ygyVA/exec";
let todosClientes   = [];
let todosProdutos   = [];
let todosVendedores = [];

// ────────────────────────────────────────────────
// JSONP
// ────────────────────────────────────────────────
let _cbCounter = 0;
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName  = "__prevfish_cb_" + (++_cbCounter);
    const timeout = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName + "_script")?.remove();
      reject(new Error("Timeout na requisição"));
    }, 15000);

    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      document.getElementById(cbName + "_script")?.remove();
      if (data.error) reject(new Error(data.error));
      else resolve(data);
    };

    const sep    = url.includes("?") ? "&" : "?";
    const script = document.createElement("script");
    script.id    = cbName + "_script";
    script.src   = url + sep + "callback=" + cbName;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error("Falha ao carregar script. Verifique a URL."));
    };
    document.head.appendChild(script);
  });
}

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────
window.onload = async () => {
  await carregarDados();
};

// ────────────────────────────────────────────────
// CARREGAR DADOS
// ────────────────────────────────────────────────
async function carregarDados() {
  mostrarLoading("Conectando à planilha...");
  try {
    const data = await jsonp(`${API_URL}?action=getData`);
    todosVendedores = data.vendedores || [];
    todosClientes   = data.clientes   || [];
    todosProdutos   = data.produtos   || [];

    // Exibe resumo no placeholder
    document.getElementById("dadosJson").textContent =
      `Vendedores: ${todosVendedores.length}\n`+
      `Clientes:   ${todosClientes.length}\n`+
      `Produtos:   ${todosProdutos.length}\n\n`+
      JSON.stringify({ vendedores: todosVendedores.slice(0,2), clientes: todosClientes.slice(0,2), produtos: todosProdutos.slice(0,2) }, null, 2);

    document.getElementById("app").style.display = "block";
    esconderLoading();
    return true;
  } catch (e) {
    esconderLoading();
    toast("❌ " + e.message, true);
    return false;
  }
}

// ────────────────────────────────────────────────
// getLancamentos
// ────────────────────────────────────────────────
async function getLancamentos(mes, ano, codVendedor) {
  return jsonp(`${API_URL}?action=getLancamentos&mes=${mes}&ano=${ano}&codVendedor=${encodeURIComponent(codVendedor||"")}`);
}

// ────────────────────────────────────────────────
// salvarLancamentos
// ────────────────────────────────────────────────
async function salvarLancamentos(codVendedor, nomeVendedor, mes, ano, linhas) {
  const url = `${API_URL}?action=salvarLancamentos`
    + `&codVendedor=${encodeURIComponent(codVendedor)}`
    + `&nomeVendedor=${encodeURIComponent(nomeVendedor)}`
    + `&mes=${mes}&ano=${ano}`
    + `&linhas=${encodeURIComponent(JSON.stringify(linhas))}`;
  return jsonp(url);
}

// ────────────────────────────────────────────────
// UI HELPERS
// ────────────────────────────────────────────────
function mostrarLoading(msg) {
  document.getElementById("loadingMsg").textContent = msg || "Aguarde...";
  document.getElementById("loading").style.display  = "flex";
}
function esconderLoading() {
  document.getElementById("loading").style.display = "none";
}
let _tt;
function toast(msg, err) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = "toast show" + (err ? " error" : "");
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.className = "toast"; }, 4500);
}
</script>
</body>
</html>
